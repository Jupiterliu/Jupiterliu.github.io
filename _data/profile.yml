short_bio: >-
  <p>
    Taifeng Liu is a Ph.D. candidate in Cyberspace Security at Xidian University, advised by Prof. Zhuo Ma. His research focuses on the security of intelligent unmanned systems, with particular interests in physical adversarial attacks, system security testing, and model stealing.
  </p>
  <p>
    He has published first-author or corresponding-author papers at NDSS, AAAI, IEEE Transactions on Intelligent Transportation Systems, and IEEE Internet of Things Journal. His recent work studies long-distance controllable physical attacks, sustainable adversarial examples in continual learning, and lightweight defenses for safety-critical vision and IoT services.
  </p>
  <p>
    He also leads a Xidian University graduate innovation project on spoofing attacks against UAV control and navigation systems, and has contributed to national key R&amp;D and NSFC projects on secure intelligent systems and multimedia data security.
  </p>

